version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestionnaire_cv_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage/app/public:/var/www/html/storage/app/public
    ports:
      - "8000:8000"
    environment:
      - APP_NAME="Gestionnaire Intelligent de CV"
      - APP_ENV=local
      - APP_KEY=base64:YOUR_APP_KEY_HERE
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=gestion_cv
      - DB_USERNAME=root
      - DB_PASSWORD=secret_password
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - OPENAI_API_KEY=your_openai_api_key_here
    depends_on:
      - db
      - redis
    networks:
      - app-network
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: mysql:8.0
    container_name: gestionnaire_cv_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gestion_cv
      MYSQL_USER: gestion_user
      MYSQL_PASSWORD: secret_password
      MYSQL_ROOT_PASSWORD: secret_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: gestionnaire_cv_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: gestionnaire_cv_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
